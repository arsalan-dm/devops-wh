<template>
    <lightning-card title={title} class="background-card-class">
        <div slot="actions">
            <lightning-button-stateful label-when-off="Expand"
                label-when-on="Collapse"
                icon-name-when-off="utility:expand_all"
                icon-name-when-on="utility:collapse_all"
                selected={_isExpanded}
                onclick={handleStatefulExpandClick} 
                class="slds-p-right_small"></lightning-button-stateful>
            <lightning-button label="Existing"
                title="existing"
                class="slds-p-right_small"
                onclick={handleButtonClick}></lightning-button>
            <lightning-button label="Proposed"
                title="proposed"
                class="slds-p-right_small"
                onclick={handleButtonClick}></lightning-button>
            <lightning-button label="Variance Number"
                title="variance (number)"
                class="slds-p-right_small"
                onclick={handleButtonClick}></lightning-button>
            <lightning-button label="Variance Percentage"
                title="variance (percentage)"
                onclick={handleButtonClick}></lightning-button>
        </div>
        <!--table header-->
        <div class="table table-class">
            <div lwc:if={orientation}>
                <div class="header-class row header">
                    <div class="slds-border_top header-item-class cell" key={record.Id}> 
                        Record Name
                        <br>
                        {readOnlySettingDisplay}
                    </div>   
                    <template for:each={_fields} for:item="field">
                        <div class="slds-border_top header-item-class cell slds-var-p-top_small" key={field.key}> 
                            {field.label}
                        </div>        
                    </template>
                </div>
        
                <div class="body-class" lwc:if={doneLoading}>
                    <template for:each={_records} for:item="record">
                        <div lwc:if={record.expanded} key={record.key} class="table-row-class row slds-border-bottom">
                            <div class="slds-border_top row-name-cell-class cell">
                                {record.label}
                            </div>
                            <template for:each={_fields} for:item="field" >
                                <div key={field.key} class="slds-border_top table-cell-class cell" data-label={record.name}>
                                    <c-dm-diff-matrix-cell 
                                        field={field} 
                                        old-record={record.old}
                                        new-record={record.new} 
                                        onvaluechanged={handleCellValueChange} 
                                        total-column={record.total} 
                                        difference-column={record.difference}
                                        read-only-setting={_readOnlySetting}
                                        read-only>
                                    </c-dm-diff-matrix-cell>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
                <lightning-card lwc:else>
                    <lightning-spinner alternative-text="loading object data"></lightning-spinner>
                </lightning-card>
            </div>

            <div lwc:else >
                <div class="header-class row header">
                    <div class="slds-border_top header-item-class cell" key={record.Id}> 
                        Field name
                    </div>   
                    <template for:each={_recordLabels} for:item="recordName">
                        <div class="slds-border_top header-item-class cell" key={recordName.key}> 
                            {recordName.name}
                        </div>        
                    </template>
                </div>
        
                <div class="body-class" lwc:if={doneLoading}>
                    <template for:each={_fields} for:item="field">
                        <div key={field.key} class="table-row-class row slds-border-bottom">
                            <div class="slds-border_top row-name-cell-class cell">
                                {field.label}
                            </div>
                            <template for:each={_records} for:item="record" >
                                <div key={record.key} class="slds-border_top table-cell-class cell" data-label={field.name}>
                                    <c-dm-diff-matrix-cell 
                                        field-name={field.name} 
                                        old-record={record.old}
                                        new-record={record.new} 
                                        onvaluechanged={handleCellValueChange} 
                                        total-column={record.total} 
                                        difference-column={record.difference}
                                        read-only-setting={_readOnlySetting}
                                        read-only>
                                    </c-dm-diff-matrix-cell>
                                </div>
                            </template>
                        </div>
                        
                    </template>
                </div>
                <lightning-card lwc:else>
                    <lightning-spinner alternative-text="loading object data"></lightning-spinner>
                </lightning-card>
            </div>
        </div>
    </lightning-card>
</template>
