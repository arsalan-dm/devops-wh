<template>
    <div class="slds-p-vertical_xx-small">
        <div lwc:if={isInternalUser} class="slds-clearfix slds-grid slds-list_horizontal">
            <div lwc:if={allowEscalation} class="slds-box slds-box_x-small slds-theme_default theme_custom slds-float_left slds-var-m-right_xx-small">
                <div class="vertical-outer">
                    <div class="vertical-inner">
                        <div lwc:if={notAlreadyEscalated} >
                            <lightning-input type="checkbox" 
                                checked={message.selected} 
                                onchange={handleChecked}
                                class="checkbox-inner">
                            </lightning-input>
                        </div>
                        <div lwc:else >
                            <lightning-icon icon-name="utility:incident" 
                                size="x-small" 
                                variant="error">
                            </lightning-icon>
                        </div>
                    </div>
                </div>
            </div>
            <div class="slds-box slds-box_x-small slds-theme_default theme_custom slds-float_left slds-float_none slds-grow slds-scrollable_none">
                <header >
                    <div class="slds-grid">
                        <div class="slds-p-right_small">
                            <b>{message.author}</b>
                        </div>
                        <div class="slds-p-right_small">
                            {formattedDateTime}
                        </div>
                        <div lwc:if={displayEscalation} class="slds-p-right_small">
                            <a href={escalationLink} onclick={navigateToEscalatedRecord} target={anchorTarget} >{message.escalationRecordName}</a>
                        </div>
                        <div lwc:if={displayChildContext}>
                            <a href={childContextLink} onclick={navigateToContextChildRecord} target={anchorTarget} >{message.contextChildName}</a>
                        </div>
                    </div>
                </header>
                <article>
                    <p>{message.body}</p>
                </article>
            </div>
        </div>
        <div lwc:else>
            <div class="slds-box slds-box_x-small slds-theme_default theme_custom">
                <header>
                    <div class="slds-grid">
                        <div class="slds-p-right_small">
                            <b>{message.author}</b>
                        </div>
                        <div class="slds-p-right_small">
                            {formattedDateTime}
                        </div>
                        <div lwc:if={displayEscalation}>
                            <a href={escalationLink} onclick={navigateToEscalatedRecord} target={anchorTarget}>Escalated</a>
                        </div>
                        <div lwc:if={escalationExternalDisplay}>
                            <b>Escalated</b>
                        </div>
                    </div>
                </header>
                <article>
                        <p>{message.body}</p>
                </article>
            </div>
            
        </div>
        
    </div>
</template>
