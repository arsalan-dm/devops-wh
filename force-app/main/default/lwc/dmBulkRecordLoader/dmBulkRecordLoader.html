<template>
    <lightning-card title="Bulk Record Loader">
        <div class="slds-p-around_small">
            <lightning-textarea
                label="Paste tab-delimited data from Excel"
                value={tabDelimitedText}
                onchange={handleTextChange}
                placeholder="Paste here..."
                rows="10">
            </lightning-textarea>

            <template for:each={fieldInputs} for:item="f">
                <lightning-input key={f.key}
                    label={f.label}
                    value={f.value}
                    data-index={f.index}
                    onchange={handleFieldChange}>
                </lightning-input>
            </template>

            <lightning-input label="Object API Name"
                value={objectApiName}
                onchange={handleObjectChange}>
            </lightning-input>

            <lightning-input type="checkbox"
                label="First row is a header"
                checked={hasHeaderRow}
                onchange={handleHeaderToggle}>
            </lightning-input>
        </div>
    </lightning-card>
</template>
