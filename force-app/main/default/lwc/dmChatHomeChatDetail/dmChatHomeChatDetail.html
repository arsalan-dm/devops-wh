<template>
    <!-- <p>Current Parent Context = {contextParent} </p>
    <p>Chat is selected = {chatIsSelected} </p> -->
    <template lwc:if={chatIsSelected}>
        <template for:each={contextParentKey} for:item="k">
            <lightning-card title={chatDetailHeader} key={k}>
                <lightning-button-group slot="actions">
                    <lightning-button variant="neutral" label="Close Chat" title="Close Chat Window" onclick={handleCloseClick} class="slds-m-left_x-small"></lightning-button>
                    <!-- <c-follow context-parent={contextParent}></c-follow> -->
                    <lightning-button variant="neutral" label="Open Record" title="Open record in a new tab" onclick={handleOpenRecordClick} icon-name="utility:new_window" icon-position="right" ></lightning-button>
                </lightning-button-group>
                    <div class="slds-m-left_medium">
                        <template if:false={isFollowing}>
                            <p class="slds-text-color_destructive">(You’ve unfollowed this chat — it will disappear on reload)</p>
                        </template>         
                    </div>

                    <c-dm-chat-window
                        key={k}                    
                        context-parent={contextParent}
                        flow-api-name={escalationFlowName}
                        flow-message-input-variable-name={flowMessageInputVariableName}
                        flow-escalation-record-output-api-name={flowEscalationRecordOutputApiName}
                        flow-context-parent-input-api-name={flowContextParentInputApiName}
                        allows-escalation={allowEscalations}
                        max-height={maxHeight}
                        anchor-target='_blank'>
                    </c-dm-chat-window>
                         
            </lightning-card>
        </template>        
    </template>     
    <template lwc:else>        
        <lightning-card title="No chat selected">
            <div class="slds-p-horizontal_medium slds-p-vertical_medium">
                <p class="slds-text-heading_medium">Click on a chat record to view the chat transcript here.</p>
            </div>
        </lightning-card>
    </template>
    
</template>
