name: MAIN-01 Multi-Environment Automated Validation Pipeline
on: 
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    
    branches:
      - develop
    
    paths:
      - 'force-app/**'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    
    branches:
      - develop
    
    paths:
      - 'force-app/**'

permissions:
  contents: write # for checkout
  pull-requests: write # for commenting
  issues: write # for commenting
  actions: write # for upload of code scanning results
  security-events: write
  
jobs:    
  add-blocking-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: ['validation-in-progress']
            });
  comment-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Add comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `
              ⏳ Starting multi-environment validation pipeline...
              🔹 Scratch → CM → QA → UAT → Regression → PROD
              `
            });

  # Scratch Org Validation
  validate-scratch:
    needs: add-blocking-label
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.repository.fork }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - name: Set up the environment
        uses: ./.github/actions/salesforce_runner_env
      - name: Auth to Scratch org
        uses: ./.github/actions/salesforce_authorisation
        with:
          organisation_url: ${{ secrets.SFDX_SCRATCH_URL }}
      - name: Perform check-only deployment to Scratch
        uses: ./.github/actions/salesforce_verification_deploy
        with:
          head_branch_name: ${{ github.event.pull_request.head.sha }}
          diff_branch_name: ${{ github.event.pull_request.base.sha }}
          username: ${{ secrets.SCRATCH_ORG_USERNAME }}

  # CM Org Validation (depends on Scratch)
  validate-cm:
    needs: validate-scratch
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.repository.fork }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - name: Set up the environment
        uses: ./.github/actions/salesforce_runner_env
      - name: Auth to CM org
        uses: ./.github/actions/salesforce_authorisation
        with:
          organisation_url: ${{ secrets.SFDX_CM_URL }}
      - name: Perform check-only deployment to CM
        uses: ./.github/actions/salesforce_verification_deploy
        with:
          head_branch_name: ${{ github.event.pull_request.head.sha }}
          diff_branch_name: ${{ github.event.pull_request.base.sha }}
          username: ${{ secrets.CM_ORG_USERNAME }}

  # QA Org Validation (depends on CM)
  validate-qa:
    needs: validate-cm
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.repository.fork }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - name: Set up the environment
        uses: ./.github/actions/salesforce_runner_env
      - name: Auth to QA org
        uses: ./.github/actions/salesforce_authorisation
        with:
          organisation_url: ${{ secrets.SFDX_QA_URL }}
      - name: Perform check-only deployment to QA
        uses: ./.github/actions/salesforce_verification_deploy
        with:
          head_branch_name: ${{ github.event.pull_request.head.sha }}
          diff_branch_name: ${{ github.event.pull_request.base.sha }}
          username: ${{ secrets.QA_ORG_USERNAME }}

  # UAT Org Validation (depends on QA)
  validate-uat:
    needs: validate-qa
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.repository.fork }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - name: Set up the environment
        uses: ./.github/actions/salesforce_runner_env
      - name: Auth to UAT org
        uses: ./.github/actions/salesforce_authorisation
        with:
          organisation_url: ${{ secrets.SFDX_UAT_URL }}
      - name: Perform check-only deployment to UAT
        uses: ./.github/actions/salesforce_verification_deploy
        with:
          head_branch_name: ${{ github.event.pull_request.head.sha }}
          diff_branch_name: ${{ github.event.pull_request.base.sha }}
          username: ${{ secrets.UAT_ORG_USERNAME }}

  # Regression Org Validation (depends on UAT)
  validate-regression:
    needs: validate-uat
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.repository.fork }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - name: Set up the environment
        uses: ./.github/actions/salesforce_runner_env
      - name: Auth to Regression org
        uses: ./.github/actions/salesforce_authorisation
        with:
          organisation_url: ${{ secrets.SFDX_REGRESSION_URL }}
      - name: Perform check-only deployment to Regression
        uses: ./.github/actions/salesforce_verification_deploy
        with:
          head_branch_name: ${{ github.event.pull_request.head.sha }}
          diff_branch_name: ${{ github.event.pull_request.base.sha }}
          username: ${{ secrets.REGRESSION_ORG_USERNAME }}

  # PROD Org Validation (depends on Regression - check-only)
  validate-prod:
    needs: validate-regression
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.repository.fork }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - name: Set up the environment
        uses: ./.github/actions/salesforce_runner_env
      - name: Auth to PROD org
        uses: ./.github/actions/salesforce_authorisation
        with:
          organisation_url: ${{ secrets.SFDX_PROD_URL }}
      - name: Perform check-only deployment to PROD
        uses: ./.github/actions/salesforce_verification_deploy
        with:
          head_branch_name: ${{ github.event.pull_request.head.sha }}
          diff_branch_name: ${{ github.event.pull_request.base.sha }}
          username: ${{ secrets.PROD_ORG_USERNAME }}

  comment-success:
    runs-on: ubuntu-latest
    needs: validate-prod
    if: success()
    steps:
      - name: Add comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `
              ✅ All validations passed!
              Pipeline stages completed successfully:
              🟢 Scratch → 🟢 CM → 🟢 QA → 🟢 UAT → 🟢 Regression → 🟢 PROD
              `
            });

  add-success-label:
    runs-on: ubuntu-latest
    needs: validate-prod
    if: success()
    steps:
      - name: Add label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: ['validation-passed', 'ready-to-merge']
            });

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: prNumber,
              name: 'validation-in-progress'
            });

  comment-failure:
    runs-on: ubuntu-latest
    needs: validate-prod
    if: failure()
    steps:
      - name: Add comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `
              ❌ Validation pipeline failed!
              Please review the failed stage and fix the issues.
              `
            });

  add-failure-label:
    runs-on: ubuntu-latest
    needs: validate-prod
    if: failure()
    steps:
      - name: Add label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: ['validation-failed']
            });

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: prNumber,
              name: 'validation-in-progress'
            });    
