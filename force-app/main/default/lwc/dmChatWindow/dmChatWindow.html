<template>
    <c-dm-chat-listener context-parent={contextParent} 
        context-child={contextChild} 
        onmessagereceived={handleMessageReceived}>
    </c-dm-chat-listener>
    <c-dm-chat-context-listener onmessagereceived={handleChildContextChange}>
    </c-dm-chat-context-listener>
    <lightning-card title={cardTitle}>
        <template if:true={isInternalUser}>
            <div slot="actions">
                <c-follow context-parent={contextParent} context-child={contextChild}></c-follow>
            </div>
        </template>
        <div class="slds-p-horizontal_medium">
            <div lwc:if={escalationMode}>
                <div class="slds-clearfix">
                    <lightning-button class='slds-float_left' 
                        label={chatEscalationCancelButtonLabel}
                        onclick={handleCancelClicked}>
                    </lightning-button>
                    <lightning-button class="slds-float_right" 
                        label={chatEscalationButtonLabel}
                        onclick={handleEscalationConfirmClicked} 
                        variant="brand">
                    </lightning-button>
                </div>
            </div>
            <div lwc:else>
                <div lwc:if={allowChatPost}>
                    <lightning-textarea label="Message body" 
                        value={_composedMessage} 
                        onchange={handleMessageChange} 
                        placeholder={chatNewMessagePlaceholderLabel}
                        variant="label-hidden">
                    </lightning-textarea>                
                    <div class="slds-clearfix">
                        <lightning-button class="slds-float_right slds-p-top_small" 
                            label={chatNewButtonLabel}
                            onclick={handleSendClick} 
                            variant="brand"
                            disabled={sendDisabled}>
                        </lightning-button>
                    </div>
                </div>
                <div lwc:else>
                    <p class="slds-text-color_weak slds-p-vertical_medium">Your user is marked as a chat read only user so you cannot post new messages or escalate chats to be cases.</p>
                </div>
            </div>
        </div>
        
        <div lwc:if={allowChatPost}>
            <div class="line-break slds-m-vertical_medium"></div>
        </div>

        <lightning-card >
            <div class="slds-p-horizontal_medium chat-window" lwc:ref="chatWindow" onscroll={handleMessagesScroll}>
                <div lwc:if={doneInitialLoading}>
                    <template for:each={messages} for:item="message">
                        <c-dm-chat-message message={message}
                            key={message.key}
                            is-internal-user={isInternalUser}
                            current-child-context={contextChild}
                            onmessageselect={handleMessageSelect}
                            allow-escalation={allowChatPost}
                            anchor-target={anchorTarget}>
                        </c-dm-chat-message>
                    </template>
                </div>  
                <lightning-spinner lwc:else variant="brand" alternative-text="loading"></lightning-spinner>
            </div>
        </lightning-card>
    </lightning-card>
</template>
