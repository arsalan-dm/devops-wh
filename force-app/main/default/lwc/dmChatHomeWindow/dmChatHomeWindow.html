<template>
    <div class="slds-p-horizontal_medium">

        <lightning-card title={chatHomeTitleLabel}>
            <lightning-button label="Refresh View" slot="actions" onclick={handleRefreshClick} icon-name="utility:refresh" icon-position="right"></lightning-button>
            <div lwc:if={doneInitialLoading} >
                <template if:true={hasChats} >
                    <div class="chat-window slds-p-horizontal_medium" onchatselect={handleChatSelect} lwc:ref="chatWindow" onscroll={handleMessagesScroll}>
                        <template for:each={chats} for:item="chat">
                            <c-dm-chat-summary chat={chat} selected-chat-parent-context={selectedChatParentContext}
                                key={chat.chatId}>
                            </c-dm-chat-summary>
                        </template>      
                    </div>                  
                </template>

                <template if:false={hasChats}>
                    <div class="slds-p-around_medium">                            
                        <p class="slds-text-heading_medium">You’re not following any chats yet.</p>    
                    </div>
                </template>
                
            </div>  
            <lightning-spinner lwc:else variant="brand" alternative-text="loading"></lightning-spinner>                
        </lightning-card>
        
    </div>
</template>
