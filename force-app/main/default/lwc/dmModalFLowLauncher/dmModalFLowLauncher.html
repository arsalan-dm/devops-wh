<template>
    <lightning-button label={buttonLabel} onclick={openModal}></lightning-button>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container customModal" 
                 style="width: fit-content!important; max-width: 75%!important;">
                <div class="customHeader" 
                     style="background-color: white; text-align: right;padding: 5px; border-radius: 5px 5px 0 0;">
                    <lightning-button-icon icon-name="utility:close"
                                            alternative-text="Close Modal" 
                                            title="Close Modal"
                                            variant="border"
                                            onclick={closeModal}>
                    </lightning-button-icon>
                </div>
                <div class="slds-modal__content slds-p-horizontal_small slds-p-vertical_xx-small" >
                    <lightning-flow flow-api-name={flowApiName}
                                    flow-input-variables={inputVariables}
                                    onstatuschange={handleStatusChange}>
                    </lightning-flow>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
