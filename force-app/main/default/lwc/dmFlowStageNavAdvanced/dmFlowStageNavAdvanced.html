<template>
    <br>
    <nav>
        <!-- Horizontal mode -->
        <template if:true={isHorizontal}>
            <lightning-progress-indicator
                current-step={currentStage}
                type={displayType}
                variant="shade"
                class="horizontal-progress"
            >
                <template for:each={_stages} for:item="stage">
                    <lightning-progress-step
                        key={stage.key}
                        value={stage.stageName}
                        onclick={handleNext}
                        label={stage.label}
                        title={stage.title}
                    >
                    </lightning-progress-step>
                </template>
            </lightning-progress-indicator>
        </template>

       <!-- Vertical mode -->
<template if:false={isHorizontal}>
    <ol class="slds-progress slds-progress_vertical">
        <template for:each={_stages} for:item="stage">
            <li key={stage.key} class={stage.className} data-value={stage.stageName} onclick={handleNext}>
                <div class="slds-progress__marker-container">
                    <div class="slds-progress__marker"></div>
                </div>
                <div class="slds-progress__item-content">
                    <span if:true={stage.label}>{stage.label}</span>
                    <span if:true={stage.title} title={stage.title}></span>
                </div>
            </li>
        </template>
    </ol>
</template>

    </nav>
    <br>
</template>
