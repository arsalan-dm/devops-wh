<template>
    <!-- If 'Picklist Mode' is enabled, then render a picklist -->
    <template lwc:if={isPicklist}>
        <lightning-combobox
            name="combobox"
            label={label}
            options={options}
            value={value}
            required={isRequired}
            onchange={handleChange}>
        </lightning-combobox>
    </template>
    <!-- Otherwise render radio options -->
    <template lwc:else>

        <lightning-radio-group
            name={name}
            label={label}
            options={options}
            value={value}
            required={isRequired}
            onchange={handleChange}>
        </lightning-radio-group>

    </template>
</template>
