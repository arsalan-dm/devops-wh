<template>
    <lightning-card title={title}>
        <div slot="actions"> 
            <lightning-button icon-name="utility:chevronleft" label="previous" class="slds-p-right_small" onclick={handlePrevious}>

            </lightning-button>
            <lightning-button icon-name="utility:chevronright" label="next" onclick={handleNext}>

            </lightning-button>
        </div>
        <c-dm-diff-matrix-read-only
            title={_title}
            records={records}
            initial-records={initialRecords}
            fields={fieldToDisplay}
            total-record-id={totalRecordId}
            record-names={recordNames}
            sobject-type={sobjectType}
            difference={difference}
            use-total-for-differences={useTotalForDifferences}
            orientation={orientation}
            start-expanded={startExpanded}
            lwc:ref="matrix">
        </c-dm-diff-matrix-read-only>
            
    </lightning-card>
</template>
